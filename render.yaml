services:
  # Ad Builder — Express API + React frontend
  - type: web
    name: fb-ad-builder
    runtime: node
    rootDir: ad-builder-app
    buildCommand: npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: FB_APP_ID
        sync: false
      - key: FB_APP_SECRET
        sync: false
      - key: FB_REDIRECT_URI
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: VITE_INTEL_URL
        sync: false
    plan: free
    healthCheckPath: /api/health

  # Intelligence Dashboard is now served by fb-ad-builder at /intel
  # (removed as separate static service — /api/ads must be on same origin as the bundle)
